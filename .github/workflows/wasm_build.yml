name: WASM Build

on:
  push:

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # タグ情報を取得するために全履歴を取得

      - name: Build
        run: ./scripts/build.sh

      - name: Set up Go with X11 dependencies
        uses: ./.github/actions/setup-go-with-x

      - name: Generate coverage report
        run: |
          # lcovインストール
          sudo apt install -y lcov
          go install github.com/jandelgado/gcov2lcov@v1.1.1
          # レポート生成
          RUINS_LOG_LEVEL=ignore go test -cover ./... -coverprofile=coverage.out
          $(go env GOPATH)/bin/gcov2lcov -infile=coverage.out -outfile=coverage.lcov
          genhtml coverage.lcov -o ./wasm/cov
          go tool cover -html=coverage.out -o ./wasm/cov/gocoverage.html
          # カバレッジバッジを生成
          percent=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          int=${percent%.*}
          if [ $int -gt 90 ]; then
            curl -o ./wasm/cov/coverage.svg "https://img.shields.io/badge/coverage-${percent}%25-green"
          elif [ $int -gt 75 ]; then
            curl -o ./wasm/cov/coverage.svg "https://img.shields.io/badge/coverage-${percent}%25-yellow"
          else
            curl -o ./wasm/cov/coverage.svg "https://img.shields.io/badge/coverage-${percent}%25-red"
          fi

      - name: Generate godoc
        run: |
          go install golang.org/x/tools/cmd/godoc@v0.24.0
          $(go env GOPATH)/bin/godoc -http=localhost:8888 & \
          sleep 60
          wget -r -np -nv -N -E -p -k -e robots=off --reject-regex="png" "http://localhost:8888/pkg/github.com/kijimaD/ruins/"
          pkill godoc
          mv localhost:8888/ ./wasm/godoc/

      - name: Check
        run: |
          ls -al ./wasm
          ls -al ./wasm/cov
          ls -al ./wasm/godoc

      - name: Publish generated content to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          branch: gh-pages
          folder: wasm
