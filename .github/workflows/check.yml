name: ⚗️Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: release
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  crosscompile:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # タグ情報を取得するために全履歴を取得
      # build.sh は host の ~/go/pkg/mod・~/.cache/go-build を Docker にマウントする
      - name: Cache Go modules & build cache
        uses: actions/cache@v6
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-crosscompile-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-crosscompile-
      - name: build
        run: make build

  build-steam:
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # タグ情報を取得するために全履歴を取得
      # build_steam.sh は host の ~/go/pkg/mod・~/.cache/go-build を Docker にマウントする
      - name: Cache Go modules & build cache (build_steam.sh の docker マウント用)
        uses: actions/cache@v6
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-build-steam-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-build-steam-
      - name: build-steam
        run: make build-steam

  test:
    runs-on: ubuntu-latest
    permissions:
      # octocov 用の設定
      # PRにコメントする
      pull-requests: write
      # 実行時間取得
      contents: read
      # 前のレポートを取得する
      actions: read
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-go-with-x
      - name: test
        run: make test
      - name: coverage for octocov
        run: make report
      - uses: k1LoW/octocov-action@v1

  flaky-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-go-with-x
      - name: Flaky check
        # race検出付きで繰り返し実行し、データ競合とフレークを検出する。
        run: make test RACE=-race COUNT=10

  bench-compare:
    # mainとPRでベンチを比較し、結果を sticky コメント表示、sec/opが2倍以上悪化したら失敗させる。
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # sticky コメント投稿用
    steps:
      # base と PR を別々に checkout する
      - uses: actions/checkout@v7 # PR を作業ルートに
      - uses: actions/checkout@v7 # ベースを _base/ に
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          path: _base
      - uses: ./.github/actions/setup-go-with-x
      - name: run benchmarks (PR and base)
        run: |
          # PRブランチで bench を実行する
          make bench > pr.txt
          # ベースブランチで bench を実行する。
          # -s 必須: -C は top-level でも "make: Entering/Leaving directory" を stdout に出し、
          # benchstat がそれを "make:" 設定行と誤解釈して base 側ベンチの突き合わせが壊れる。
          # -s はこのメッセージも recipe echo も両方抑止する（Makefile の @ では -C 由来は消せない）。
          if ! make -s -C _base bench > base.txt 2> base_err.txt; then
            echo "::warning::base のベンチ取得に失敗しました。比較をスキップします"
            # bench ターゲット無し・ビルドエラー等の失敗は base.txt 空のまま比較スキップにする。
            # エラー原因を base_err.txt に残す。
            sed 's/^/base bench err: /' base_err.txt || true
          fi
      - name: compare
        id: cmp
        run: |
          # 途中でクラッシュしても sticky comment ステップがファイル無しで失敗しないよう保証する
          touch cmp.md
          bad=
          # 実際にベンチを実行した commit を表示する
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          PR_SHA=$(git rev-parse --short HEAD)
          BASE_SHA=$(git -C _base rev-parse --short HEAD 2>/dev/null || echo unknown)
          SHA_LINE="> 実行コミット: base [\`${BASE_SHA}\`](${REPO_URL}/commit/${BASE_SHA}) → PR [\`${PR_SHA}\`](${REPO_URL}/commit/${PR_SHA})"
          # benchstat -format csv の geomean 行は次の形:
          #   ,sec/op,CI,sec/op,CI,vs base,P        ← metric ヘッダ行（$1="" $2=metric）
          #   geomean,<base値>,,<pr値>,,+200.00%,    ← $1=geomean $2=base $4=pr
          if grep -q '^Benchmark' base.txt 2>/dev/null; then
            # base vs PR を並べて表示
            { echo '### ベンチ比較 (base vs PR)'; echo "$SHA_LINE"; echo '```'; go tool benchstat base.txt pr.txt; echo '```'; } > cmp.md
            # sec/op の geomean が2倍以上悪化したパッケージを検出する。
            # 個別ベンチはサンプル数1だとノイズで簡単に2倍になり誤発火するため、
            # 集約値の geomean で判定する。 geomean が2倍動くには大半のベンチが劣化する必要がある。
            bad=$(go tool benchstat -format csv base.txt pr.txt 2>/dev/null | awk -F, '
              $1=="" && $2!="" { metric=$2; next }
              $1=="geomean" && metric=="sec/op" && ($2+0==$2) && ($4+0==$4) && $2>0 && $4/$2>=2 {
                printf "- geomean: x%.2f\n", $4/$2 }')
          else
            # base 側にベンチが無い（初回PR・リネーム・base ビルド失敗等）場合、 PR のみ表示し比較不可を明示する
            { echo '### ベンチ (PR のみ・base と比較不可)';
              echo "$SHA_LINE";
              echo '> base 側に比較対象のベンチが取得できなかったため、今回は PR の数値のみ表示します。';
              echo '```'; go tool benchstat pr.txt; echo '```'; } > cmp.md
          fi
          cat cmp.md
          { echo "bad<<EOF"; echo "$bad"; echo "EOF"; } >> "$GITHUB_OUTPUT"
      - name: sticky comment
        if: always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: bench-compare
          path: cmp.md
      - name: gate on catastrophic regression
        if: steps.cmp.outputs.bad != ''
        run: |
          echo "::error::ベンチマークが2倍以上悪化しました。詳細はPRコメント参照"
          exit 1

  check-ui:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editor-ui/package-lock.json
      - name: install
        run: npm ci --prefix editor-ui
      - name: check-ui
        run: make check-ui

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-go-with-x
      - name: lint
        run: make toolsinstall lint

  generate-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-go-with-x
      - name: generate
        run: make generate
      - name: check diff
        run: |
          git status # ジョブが失敗したとき、どこで失敗したか人が確認する用
          test -z "$(git status -s)"

  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Get git tag(short)
        id: git-tag
        run: |
          GIT_TAG=$(git rev-parse --short HEAD)
          echo "git-tag=$GIT_TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image for release
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v7
        with:
          context: .
          builder: ${{ steps.buildx.outputs.name }}
          target: release
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ steps.git-tag.outputs.git-tag }},ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
