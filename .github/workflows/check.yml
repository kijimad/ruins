name: ⚗️Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: release
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  crosscomple:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # タグ情報を取得するために全履歴を取得
      - name: build
        run: make build

  build-steam:
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # タグ情報を取得するために全履歴を取得
      - name: build-steam
        run: make build-steam

  test:
    runs-on: ubuntu-latest
    permissions:
      # octocov 用の設定
      # PRにコメントする
      pull-requests: write
      # 実行時間取得
      contents: read
      # 前のレポートを取得する
      actions: read
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-go-with-x
      - name: Cache Go modules
        uses: actions/cache@v6
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: test
        run: make test
      - name: coverage for octocov
        run: make report
      - uses: k1LoW/octocov-action@v1

  flaky-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-go-with-x
      - name: Cache Go modules
        uses: actions/cache@v6
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Flaky check
        # -race を常時付与しているため COUNT を抑えて実行時間の膨張を防ぐ
        run: make test COUNT=10

  bench-compare:
    # PRのベースブランチとベンチを比較し、sec/opが2倍以上悪化したら失敗させる。
    # 比較表は sticky コメントでPRに表示する
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # sticky コメント投稿用
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # ベースブランチのベンチ実行に全履歴が必要
      - uses: ./.github/actions/setup-go-with-x
      - name: Cache Go modules
        uses: actions/cache@v6
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest
      - name: fetch base branch
        # BASE=FETCH_HEAD を確実に解決できるよう、比較対象を明示 fetch する
        run: git fetch --no-tags --depth=1 origin ${{ github.event.pull_request.base.ref }}
      - name: run bench-compare
        id: bench
        run: |
          set +e
          BASE=FETCH_HEAD ./scripts/bench-compare.sh > /tmp/bench-result.md
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          cat /tmp/bench-result.md
      - name: sticky comment
        if: always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: bench-compare
          path: /tmp/bench-result.md
      - name: gate on catastrophic regression
        if: steps.bench.outputs.exit_code != '0'
        run: |
          echo "::error::ベンチマークが2倍以上悪化しました（詳細はPRコメント参照）"
          exit 1

  check-ui:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editor-ui/package-lock.json
      - name: install
        run: npm ci --prefix editor-ui
      - name: check-ui
        run: make check-ui

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-go-with-x
      - name: Cache Go modules
        uses: actions/cache@v6
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: lint
        run: make toolsinstall lint

  generate-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-go-with-x
      - name: Cache Go modules
        uses: actions/cache@v6
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: generate
        run: make generate
      - name: check diff
        run: |
          git status # ジョブが失敗したとき、どこで失敗したか人が確認する用
          test -z "$(git status -s)"

  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Get git tag(short)
        id: git-tag
        run: |
          GIT_TAG=$(git rev-parse --short HEAD)
          echo "git-tag=$GIT_TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image for release
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v7
        with:
          context: .
          builder: ${{ steps.buildx.outputs.name }}
          target: release
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ steps.git-tag.outputs.git-tag }},ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
