name: 'Setup Go for Ebiten'
description: 'Ebiten 用のコンパイル・起動に必要な複雑なセットアップを行う'
runs:
  using: "composite"
  steps:
    - name: install dependencies
      shell: bash
      run: |
        sudo apt update -y
        sudo apt install -y libc6-dev libglu1-mesa-dev libgl1-mesa-dev libxcursor-dev libxi-dev libxinerama-dev libxrandr-dev libxxf86vm-dev libasound2-dev pkg-config
        # 仮想ディスプレイはここでは起動しない。make の各ターゲットが xvfb-run -a で
        # その都度立てるため、ここでも Xvfb :99 を立てると画面が二重になり、xvfb-run が
        # 別ディスプレイ :100 を新規起動する。その一斉接続で稀に "Failed to open display" になる。
        # ローカルと CI で表示経路を xvfb-run に一本化して二重起動を避ける。
        # ebitenのgamepad初期化がEINTRでパニックするのを防ぐ
        sudo mount -t tmpfs tmpfs /dev/input
    - name: set up go
      uses: actions/setup-go@v6
      with:
        # go.mod に自動追従する
        # デフォルトでは go.mod を読まない
        go-version-file: 'go.mod'
