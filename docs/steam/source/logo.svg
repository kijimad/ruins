      <!-- 中央のダイヤモンド -->
      <polygon points="0,-50 40,0 0,50 -40,0" fill="#000000" />
      <!-- 左ライン -->
      <line x1="-60" y1="0" x2="-1200" y2="0" stroke="#000000" stroke-width="8" />
      <line x1="-1200" y1="-20" x2="-1200" y2="20" stroke="#000000" stroke-width="8" />
      <!-- 右ライン -->
      <line x1="60" y1="0" x2="1200" y2="0" stroke="#000000" stroke-width="8" />
      <line x1="1200" y1="-20" x2="1200" y2="20" stroke="#000000" stroke-width="8" />
    </g>
  </g>
