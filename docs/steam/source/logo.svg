   id="svg1"
   xmlns="http://www.w3.org/2000/svg">
  <defs id="defs1" />
  <g id="layer1">
    <!-- タイトル文字 -->
    <text
       xml:space="preserve"
       style="font-size:1058.33px;fill:#000000;stroke-width:0.264583"
       x="3.6627867"
       y="890.44653"
       id="text1"><tspan
         id="tspan1"
         style="font-style:normal;font-variant:normal;font-weight:100;font-stretch:normal;font-size:1058.33px;font-family:Augustus;-inkscape-font-specification:'Augustus Thin';stroke-width:0.264583"
         x="3.6627867"
         y="890.44653">Ruins</tspan></text>
    <!-- 装飾ライン: 文字下に左右に伸びる細線 + 中央ダイヤモンド -->
