      properties:
        messageKey:
          type: string
          description: メッセージリソースのキー
      description: 会話データ
    DispositionType:
      type: string
      enum:
        - hostile
        - neutral
        - cowardly
      description: 態度タイプ。エンティティの他者に対する初期態度を定義する
