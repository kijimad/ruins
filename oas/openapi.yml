components:
  schemas:
    Abilities:
      type: object
      required:
        - vitality
        - strength
        - sensation
        - dexterity
        - agility
        - defense
      properties:
        vitality:
          type: integer
          format: int32
          description: 体力。HPに影響する
        strength:
          type: integer
          format: int32
          description: 筋力。物理ダメージに影響する
        sensation:
          type: integer
          format: int32
          description: 感覚。命中率と回避率に影響する
        dexterity:
          type: integer
          format: int32
          description: 器用さ。クリティカル率に影響する
        agility:
          type: integer
          format: int32
          description: 敏捷性。行動順に影響する
        defense:
          type: integer
          format: int32
          description: 防御力。被ダメージを軽減する
      description: 能力値
    Ammo:
      type: object
      required:
        - ammoTag
        - damageBonus
        - accuracyBonus
      properties:
        ammoTag:
          allOf:
            - $ref: '#/components/schemas/AmmoTag'
          description: 弾薬の種類タグ
        damageBonus:
          type: integer
          format: int32
          description: ダメージ補正値
        accuracyBonus:
          type: integer
          format: int32
          description: 命中率補正値
      description: 弾薬設定
    AmmoTag:
      type: string
      enum:
        - 9mm
        - rifle
        - shell
        - energy_cell
      description: 弾薬タグ
    AttackCategory:
      type: string
      enum:
        - FIST
        - SWORD
        - SPEAR
        - HANDGUN
        - RIFLE
        - CANON
        - BOW
      description: 攻撃種別
    BehaviorStrategyType:
      type: string
      enum:
        - random
        - patrol
        - wallHug
        - stationary
        - wander
        - territorial
        - swarm
      description: 非戦闘時の移動パターン
    Book:
      type: object
      required:
        - totalEffort
      properties:
        totalEffort:
          type: integer
          format: int32
          description: 読了に必要な総読書量
        skill:
          allOf:
            - $ref: '#/components/schemas/SkillBook'
          description: スキル本としての設定。未設定なら娯楽本
      description: 本の設定
    CommandTable:
      type: object
      required:
        - name
        - entries
      properties:
        name:
          type: string
          description: テーブル名
        entries:
          type: array
          items:
            $ref: '#/components/schemas/CommandTableEntry'
          description: コマンドエントリのリスト
      description: コマンドテーブル
    CommandTableEntry:
      type: object
      required:
        - weapon
        - weight
      properties:
        weapon:
          type: string
          description: 使用する武器名
        weight:
          type: number
          format: double
          description: 選択される重み。大きいほど選ばれやすい
      description: コマンドテーブルエントリ
    CommandTableList:
      type: object
      required:
        - data
        - totalCount
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CommandTable'
          description: コマンドテーブルの配列
        totalCount:
          type: integer
          format: int32
          description: 総件数
      description: コマンドテーブル一覧
    Consumable:
      type: object
      required:
        - usableScene
        - targetGroup
        - targetNum
      properties:
