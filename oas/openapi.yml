components:
  schemas:
    Abilities:
      type: object
      required:
        - vitality
        - strength
        - sensation
        - dexterity
        - agility
        - defense
      properties:
        vitality:
          $ref: '#/components/schemas/Vitality'
        strength:
          $ref: '#/components/schemas/Strength'
        sensation:
          $ref: '#/components/schemas/Sensation'
        dexterity:
          $ref: '#/components/schemas/Dexterity'
        agility:
          $ref: '#/components/schemas/Agility'
        defense:
          $ref: '#/components/schemas/Defense'
      description: 能力値
    Accuracy:
      type: integer
      format: int32
      description: 命中率
    AccuracyBonus:
      type: integer
      format: int32
      description: 命中率補正値
    ActionCost:
      type: integer
      format: int32
      description: 行動コスト
    Agility:
      type: integer
      format: int32
      description: 敏捷性。行動順に影響する
    Ammo:
      type: object
      required:
        - damageBonus
        - accuracyBonus
      properties:
        ammoTag:
          $ref: '#/components/schemas/AmmoTag'
        damageBonus:
          $ref: '#/components/schemas/DamageBonus'
        accuracyBonus:
          $ref: '#/components/schemas/AccuracyBonus'
      description: 弾薬設定
    AmmoTag:
      type: string
      enum:
        - 9mm
        - rifle
        - shell
        - energy_cell
      description: 弾薬タグ
    ArmorDefense:
      type: integer
      format: int32
      description: 防具の防御力
    AttackCategory:
      type: string
      enum:
        - FIST
        - SWORD
        - SPEAR
        - HANDGUN
        - RIFLE
        - CANON
        - BOW
      description: 攻撃種別
    AttackCount:
      type: integer
      format: int32
      description: 1ターンあたりの攻撃回数
    BaseDamage:
      type: integer
      format: int32
      description: 基本ダメージ
    BlocksPassage:
      type: boolean
      description: 通行を妨げるかどうか
    BlocksView:
      type: boolean
      description: 視線を遮るかどうか
    Book:
      type: object
      required:
        - totalEffort
      properties:
        totalEffort:
          $ref: '#/components/schemas/ReadingEffort'
        skill:
          $ref: '#/components/schemas/SkillBook'
      description: 本の設定
    ColorChannel:
      type: integer
      format: uint8
      description: RGBA色チャネル値 (0-255)
    CommandTable:
      type: object
      required:
        - name
        - entries
      properties:
        name:
          $ref: '#/components/schemas/EntityName'
        entries:
          type: array
          items:
            $ref: '#/components/schemas/CommandTableEntry'
      description: コマンドテーブル
    CommandTableEntry:
      type: object
      required:
        - weapon
        - weight
      properties:
        weapon:
          $ref: '#/components/schemas/EntityName'
        weight:
          $ref: '#/components/schemas/EntryWeight'
      description: コマンドテーブルエントリ
    CommandTableList:
      type: object
      required:
        - data
        - totalCount
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CommandTable'
        totalCount:
          type: integer
          format: int32
      description: コマンドテーブル一覧
    Consumable:
