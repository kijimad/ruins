components:
  schemas:
    Abilities:
      type: object
      required:
        - vitality
        - strength
        - sensation
        - dexterity
        - agility
        - defense
      properties:
        vitality:
          $ref: '#/components/schemas/Vitality'
        strength:
          $ref: '#/components/schemas/Strength'
        sensation:
          $ref: '#/components/schemas/Sensation'
        dexterity:
          $ref: '#/components/schemas/Dexterity'
        agility:
          $ref: '#/components/schemas/Agility'
        defense:
          $ref: '#/components/schemas/Defense'
      description: 能力値
    Accuracy:
      type: integer
      format: int32
      minimum: 0
      maximum: 100
      description: 命中率。0で必中なし、100で必中
    AccuracyBonus:
      type: integer
      format: int32
      minimum: -100
      maximum: 100
      description: 命中率補正値
    ActionCost:
      type: integer
      format: int32
      minimum: 0
      maximum: 100
      description: 行動コスト
    Agility:
      type: integer
      format: int32
      minimum: -100
      maximum: 100
      description: 敏捷性。行動順に影響する
    Ammo:
      type: object
      required:
        - damageBonus
        - accuracyBonus
      properties:
        ammoTag:
          $ref: '#/components/schemas/AmmoTag'
        damageBonus:
          $ref: '#/components/schemas/DamageBonus'
        accuracyBonus:
          $ref: '#/components/schemas/AccuracyBonus'
      description: 弾薬設定
    AmmoTag:
      type: string
      enum:
        - 9mm
        - rifle
        - shell
        - energy_cell
      description: 弾薬タグ
    ArmorDefense:
      type: integer
      format: int32
      minimum: 0
      maximum: 999
      description: 防具の防御力
    AttackCategory:
      type: string
      enum:
        - FIST
        - SWORD
        - SPEAR
        - HANDGUN
        - RIFLE
        - CANON
        - BOW
      description: 攻撃種別
    AttackCount:
      type: integer
      format: int32
      minimum: 1
      maximum: 10
      description: 1ターンあたりの攻撃回数
    BaseDamage:
      type: integer
      format: int32
      minimum: 0
      maximum: 9999
      description: 基本ダメージ
    BlocksPassage:
      type: boolean
      description: 通行を妨げるかどうか
    BlocksView:
      type: boolean
      description: 視線を遮るかどうか
    Book:
      type: object
      required:
        - totalEffort
      properties:
        totalEffort:
          $ref: '#/components/schemas/ReadingEffort'
        skill:
          $ref: '#/components/schemas/SkillBook'
      description: 本の設定
    ColorChannel:
      type: integer
      format: uint8
      description: RGBA色チャネル値 (0-255)
    CommandTable:
      type: object
      required:
        - name
        - entries
      properties:
        name:
          $ref: '#/components/schemas/EntityName'
        entries:
          type: array
          items:
            $ref: '#/components/schemas/CommandTableEntry'
      description: コマンドテーブル
    CommandTableEntry:
      type: object
      required:
        - weapon
        - weight
      properties:
        weapon:
          $ref: '#/components/schemas/EntityName'
        weight:
          $ref: '#/components/schemas/EntryWeight'
      description: コマンドテーブルエントリ
    CommandTableList:
      type: object
      required:
        - data
        - totalCount
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CommandTable'
        totalCount:
          type: integer
          format: int32
      description: コマンドテーブル一覧
    Consumable:
      type: object
      required:
        - usableScene
        - targetGroup
        - targetNum
      properties:
        usableScene:
          $ref: '#/components/schemas/UsableScene'
        targetGroup:
          $ref: '#/components/schemas/TargetGroup'
        targetNum:
          $ref: '#/components/schemas/TargetNum'
      description: 消費可能アイテムの設定
    DamageBonus:
      type: integer
      format: int32
      minimum: -100
      maximum: 100
      description: ダメージ補正値
    Defense:
      type: integer
      format: int32
      minimum: -100
      maximum: 100
      description: 防御力。被ダメージを軽減する
    DepthLevel:
      type: integer
      format: int32
      minimum: 0
      maximum: 100
      description: 階層レベル
    Dexterity:
      type: integer
      format: int32
      minimum: -100
      maximum: 100
      description: 器用さ。クリティカル率に影響する
    Dialog:
      type: object
      required:
        - messageKey
      properties:
        messageKey:
          $ref: '#/components/schemas/MessageKey'
      description: 会話データ
    DispositionType:
      type: string
      enum:
        - hostile
        - neutral
        - cowardly
      description: 態度タイプ。エンティティの他者に対する初期態度を定義する
    DoorLockTriggerRaw:
      type: object
      description: 扉ロックトリガー
    DoorRaw:
      type: object
      description: 扉ローデータ
    DropTable:
      type: object
      required:
        - name
        - entries
      properties:
        name:
          $ref: '#/components/schemas/EntityName'
        entries:
          type: array
          items:
            $ref: '#/components/schemas/DropTableEntry'
      description: ドロップテーブル
    DropTableEntry:
      type: object
      required:
        - material
        - weight
      properties:
        material:
          type: string
          description: ドロップする素材名。空文字はドロップなしを意味する
        weight:
          $ref: '#/components/schemas/EntryWeight'
      description: ドロップテーブルエントリ
    DropTableList:
      type: object
      required:
        - data
        - totalCount
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DropTable'
        totalCount:
          type: integer
          format: int32
      description: ドロップテーブル一覧
    DungeonGateTriggerRaw:
      type: object
      description: ダンジョン選択ゲートトリガー
    Element:
      type: string
      enum:
        - NONE
        - FIRE
        - THUNDER
        - CHILL
        - PHOTON
      description: 攻撃属性
    EnemyTable:
      type: object
      required:
        - name
        - entries
      properties:
        name:
          $ref: '#/components/schemas/EntityName'
        entries:
          type: array
          items:
            $ref: '#/components/schemas/EnemyTableEntry'
      description: 敵テーブル
    EnemyTableEntry:
      type: object
      required:
        - enemyName
        - weight
        - minDepth
        - maxDepth
        - packMin
        - packMax
      properties:
        enemyName:
          $ref: '#/components/schemas/EntityName'
        weight:
          $ref: '#/components/schemas/EntryWeight'
        minDepth:
          $ref: '#/components/schemas/DepthLevel'
        maxDepth:
          $ref: '#/components/schemas/DepthLevel'
        packMin:
          $ref: '#/components/schemas/PackMin'
        packMax:
          $ref: '#/components/schemas/PackMax'
      description: 敵テーブルエントリ
    EnemyTableList:
      type: object
      required:
        - data
        - totalCount
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/EnemyTable'
        totalCount:
          type: integer
          format: int32
      description: 敵テーブル一覧
    EntityDescription:
      type: string
      minLength: 1
      maxLength: 200
      description: 説明文
    EntityName:
      type: string
      minLength: 1
      maxLength: 50
      description: エンティティ名
    EntryWeight:
      type: number
      format: double
      minimum: 0
      description: テーブルエントリの重み。大きいほど選ばれやすい
    EquipBonus:
      type: object
      required:
        - vitality
        - strength
        - sensation
        - dexterity
        - agility
      properties:
        vitality:
          $ref: '#/components/schemas/Vitality'
        strength:
          $ref: '#/components/schemas/Strength'
        sensation:
          $ref: '#/components/schemas/Sensation'
        dexterity:
          $ref: '#/components/schemas/Dexterity'
        agility:
          $ref: '#/components/schemas/Agility'
      description: 装備ボーナス
    EquipSlot:
      type: string
      enum:
        - HEAD
        - TORSO
        - ARMS
        - HANDS
        - LEGS
        - FEET
        - WEAPON1
        - WEAPON2
        - WEAPON3
        - WEAPON4
        - WEAPON5
      description: 装備スロット。防具部位 + 武器スロット
    EquipmentCategory:
      type: string
      enum:
        - HEAD
        - TORSO
        - ARMS
        - HANDS
        - LEGS
        - FEET
        - JEWELRY
      description: 装備部位
    Error:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: エラーメッセージ
      description: エラーレスポンス
    FactionMemberType:
      type: string
      enum:
        - FactionNeutral
      description: 派閥タイプ
    Fire:
      type: object
      required:
        - accuracy
        - damage
        - attackCount
        - element
        - attackCategory
        - cost
        - targetGroup
        - targetNum
        - magazineSize
        - reloadEffort
      properties:
        accuracy:
          $ref: '#/components/schemas/Accuracy'
        damage:
          $ref: '#/components/schemas/BaseDamage'
        attackCount:
          $ref: '#/components/schemas/AttackCount'
        element:
          $ref: '#/components/schemas/Element'
        attackCategory:
          $ref: '#/components/schemas/AttackCategory'
        cost:
          $ref: '#/components/schemas/ActionCost'
        targetGroup:
          $ref: '#/components/schemas/TargetGroup'
        targetNum:
          $ref: '#/components/schemas/TargetNum'
        magazineSize:
          $ref: '#/components/schemas/MagazineSize'
        reloadEffort:
          $ref: '#/components/schemas/ReloadEffort'
        ammoTag:
          $ref: '#/components/schemas/AmmoTag'
      description: 遠距離攻撃設定
    FoliageType:
      type: number
      enum:
        - 0
        - -1
        - -3
      description: 植生タイプ
    HealAmount:
      type: integer
      format: int32
      minimum: 0
      maximum: 9999
      description: 回復固定量
    HealRatio:
      type: number
      format: double
      minimum: 0
      maximum: 1
      description: 回復割合。0.0〜1.0
    HealingValueType:
      type: string
      enum:
        - PERCENTAGE
        - ABSOLUTE
        - NUMERAL
      description: 回復量の計算方式
    ImagePath:
      type: string
      minLength: 1
      maxLength: 200
      pattern: ^[a-zA-Z0-9_/\-]+\.[a-zA-Z0-9]+$
      description: 画像ファイルパス
    InsulationCold:
      type: integer
      format: int32
      minimum: -100
      maximum: 100
      description: 耐寒性能
    InsulationHeat:
      type: integer
      format: int32
      minimum: -100
      maximum: 100
      description: 耐暑性能
    IsBoss:
      type: boolean
      description: ボスモンスターかどうか
    IsPlayer:
      type: boolean
      description: プレイヤーキャラクターかどうか
    Item:
      type: object
      required:
        - name
        - description
        - spriteSheetName
        - spriteKey
        - value
      properties:
        name:
          $ref: '#/components/schemas/EntityName'
        description:
          $ref: '#/components/schemas/EntityDescription'
        spriteSheetName:
          $ref: '#/components/schemas/SpriteSheetName'
        spriteKey:
          $ref: '#/components/schemas/SpriteKey'
        animKeys:
          type: array
          items:
            $ref: '#/components/schemas/SpriteKey'
        value:
          $ref: '#/components/schemas/ItemValue'
        weight:
          $ref: '#/components/schemas/ItemWeight'
        inflictsDamage:
          $ref: '#/components/schemas/BaseDamage'
        providesNutrition:
          $ref: '#/components/schemas/NutritionAmount'
        stackable:
          $ref: '#/components/schemas/Stackable'
        consumable:
          $ref: '#/components/schemas/Consumable'
        providesHealing:
          $ref: '#/components/schemas/ProvidesHealing'
        wearable:
          $ref: '#/components/schemas/Wearable'
        equipBonus:
          $ref: '#/components/schemas/EquipBonus'
        weapon:
          $ref: '#/components/schemas/Weapon'
        ammo:
          $ref: '#/components/schemas/Ammo'
        melee:
          $ref: '#/components/schemas/Melee'
        fire:
          $ref: '#/components/schemas/Fire'
        book:
          $ref: '#/components/schemas/Book'
      description: アイテム
    ItemCount:
      type: integer
      format: int32
      minimum: 1
      maximum: 9999
      description: アイテム所持数
    ItemGroup:
      type: object
      required:
        - name
        - subtype
        - entries
      properties:
        name:
          $ref: '#/components/schemas/EntityName'
        subtype:
          $ref: '#/components/schemas/ItemGroupSubtype'
        entries:
          type: array
          items:
            $ref: '#/components/schemas/ItemGroupEntry'
      description: アイテムグループ。アイテムの出現セットを定義する
    ItemGroupEntry:
      type: object
      required:
        - itemName
        - weight
        - packMin
        - packMax
      properties:
        itemName:
          $ref: '#/components/schemas/EntityName'
        weight:
          allOf:
            - $ref: '#/components/schemas/EntryWeight'
          description: 'distribution: 相対重み。collection: 確率（0-100）'
        packMin:
          $ref: '#/components/schemas/PackMin'
        packMax:
          $ref: '#/components/schemas/PackMax'
      description: アイテムグループエントリ
    ItemGroupList:
      type: object
      required:
        - data
        - totalCount
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ItemGroup'
        totalCount:
          type: integer
          format: int32
      description: アイテムグループ一覧
    ItemGroupSubtype:
      type: string
      enum:
        - distribution
        - collection
      description: アイテムグループのサブタイプ
    ItemList:
      type: object
      required:
        - data
        - totalCount
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Item'
        totalCount:
          type: integer
          format: int32
      description: アイテム一覧レスポンス
    ItemTable:
      type: object
      required:
        - name
        - entries
      properties:
        name:
          $ref: '#/components/schemas/EntityName'
        entries:
          type: array
          items:
            $ref: '#/components/schemas/ItemTableEntry'
      description: アイテムテーブル
    ItemTableEntry:
      type: object
      required:
        - groupName
        - weight
