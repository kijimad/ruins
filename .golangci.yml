version: "2"
linters:
  # standard: [errcheck govet ineffassign staticcheck unused]
  default: standard
  enable:
    - unconvert      # 意味のない型変換チェック
    - revive         # golintの後継、Go標準コーディング規約
    - misspell       # スペルミスチェック
    - bodyclose      # HTTPレスポンスボディのclose忘れ防止
    - goconst        # 定数化可能な文字列/数値の検出
    - unparam        # 未使用パラメータ検出
    - copyloopvar    # ループ変数コピー問題検出（重要なバグ防止）
    - prealloc       # パフォーマンス最適化：スライス事前割り当て
    - gocyclo        # 循環複雑度チェック（テスタビリティ向上）
    - nakedret       # 裸のreturn文検出（可読性向上）
    - nilerr         # nilエラー処理の不備検出（重要なバグ防止）
    - decorder       # 宣言順序チェック（コード構造の一貫性）
    - paralleltest   # テストの並列実行（t.Parallel()）推奨
    - tparallel      # t.Parallel()の不適切な使用検出
    - depguard       # 依存関係制御（禁止パッケージの使用防止）
    - exhaustive     # enum switch文の網羅性チェック（バグ防止）
    - gocritic       # 意見の分かれない有用なチェックのみ個別有効化する
    - errorlint      # エラーラップ（%w）の不備検出（errors.Is/Asを効かせる）
    - thelper        # テストヘルパのt.Helper()欠落検出（失敗行を正確にする）
    - nilnil         # (nil, nil)返しの検出（センチネルエラーを促す）
    - wastedassign   # 使われない代入の検出
    - mirror         # string/[]byteの非効率なメソッド選択を検出（性能）
    - errname        # センチネルエラーの命名規約（errXxx）
    - testifylint    # testifyの誤用検出（require-error, float-compare 等）
    # 現状と乖離が大きいので追加しない
    # - testpackage  # テストファイルの命名規約（テスト品質向上）

  exclusions:
    paths:
      - editor-ui/node_modules # npmパッケージ内のGoファイルを除外する

  settings:
    gocritic:
      # diagnostic/styleのデフォルトチェック（unlambda, ifElseChain, assignOp, underef 等）に加えて、性能系の rangeValCopy のみ追加で有効化する。
      # hugeParam は値渡しを広くポインタ化させ、エイリアシングのリスクと大きな差分を招くため採用しない。
      # commentedOutCode は日本語コメントを誤検知するため採用しない。
      enabled-checks:
        - rangeValCopy # rangeでの大きな値コピーを検出する（性能）
    testifylint:
      # デフォルトで大半のチェックが有効。合わない下位チェックのみ個別に無効化する。
      # float-compare は厳密値/センチネル/0との比較が大半で、InDeltaの許容誤差付与が恣意的でノイズになるため無効化する。
      disable:
        - float-compare
    exhaustive:
      check:
        - switch
      default-signifies-exhaustive: true # default句があれば網羅性を満たす
    depguard:
      rules:
        deprecated_packages:
          list-mode: lax
          deny:
            - pkg: "math/rand$"
              desc: math/rand/v2 を使う
            - pkg: "github.com/sirupsen/logrus"
              desc: 標準ライブラリを使う
            - pkg: "github.com/pkg/errors"
              desc: 標準ライブラリを使う
            - pkg: "github.com/hajimehoshi/ebiten$"
              desc: ebiten/v2を使う
        engine_guard:
          list-mode: lax
          files:
            - "**/internal/engine/**"
            - "!$test"
          deny:
            # 正確にmodule名である必要がある。ワイルドカードは使えない
            - pkg: "github.com/kijimaD/ruins/internal/world"
              desc: engineはworldに依存しない
            - pkg: "github.com/kijimaD/ruins/internal/components"
              desc: engineはcomponentsに依存しない
            - pkg: "github.com/kijimaD/ruins/internal/resources"
              desc: engineはresourcesに依存しない
